      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>

  </div>
</header>

<!-- ═══ SEARCH OVERLAY ═══ -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="search-panel" onclick="event.stopPropagation()">
    <div class="sp-input-wrap">
      <svg width="17" height="17" viewBox="0 0 17 17" fill="none"><circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.5"/><line x1="12" y1="12" x2="16" y2="16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="searchInput" placeholder="搜索文章标题、关键词…" oninput="doSearch(this.value)" autocomplete="off">
      <span class="sp-esc">ESC</span>
    </div>
    <div class="sp-results" id="searchResults"><div class="sp-empty">输入关键词开始搜索…</div></div>
  </div>
</div>

<!-- ═══ MAIN LAYOUT ═══ -->
<div class="layout">
  <button class="sb-reopen-btn" onclick="toggleSidebar()" title="展开侧边栏" aria-label="展开侧边栏">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 1L11 7L3 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  <nav class="sidebar" id="sidebar"><!-- JS rendered --></nav>
  <div class="content-area">
    <div class="content-main" id="pageRoot"><!-- JS rendered --></div>
    <div class="toc-rail" id="tocRail"><!-- JS rendered --></div>
  </div>
</div>

<!-- ═══ MUSIC PLAYER ═══ -->
<div class="music-bg" id="musicBg"></div>
<div class="music-player minimized" id="musicPlayer">
  <!-- Mini row (visible when minimized) -->
  <div class="mp-mini-row" id="mpMiniRow">
    <div class="mp-mini-cover" id="mpMiniCover">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%237c5ce7'/%3E%3Cstop offset='100%25' stop-color='%23d9467a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='80' height='80' rx='16' fill='url(%23g)'/%3E%3Ccircle cx='40' cy='30' r='14' fill='none' stroke='white' stroke-width='2.5' opacity='.85'/%3E%3Ccircle cx='40' cy='30' r='4' fill='white' opacity='.85'/%3E%3Crect x='38' y='44' width='4' height='16' rx='2' fill='white' opacity='.85'/%3E%3Crect x='28' y='48' width='4' height='8' rx='2' fill='white' opacity='.6'/%3E%3Crect x='48' y='48' width='4' height='8' rx='2' fill='white' opacity='.6'/%3E%3C/svg%3E" alt="" id="mpMiniCoverImg"
        onerror="this.onerror=null;this.src='data:image/svg+xml,'+encodeURIComponent('<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 80 80%22><defs><linearGradient id=%22g%22 x1=%220%22 y1=%220%22 x2=%22100%22 y2=%22100%22><stop offset=%220%22 stop-color=%22%237c5ce7%22/><stop offset=%22100%22 stop-color=%22%23d9467a%22/></linearGradient></defs><rect width=%2280%22 height=%2280%22 rx=%2216%22 fill=%22url(%23g)%22/><circle cx=%2240%22 cy=%2230%22 r=%2214%22 fill=%22none%22 stroke=%22white%22 stroke-width=%222.5%22 opacity=%22.85%22/><circle cx=%2240%22 cy=%2230%22 r=%224%22 fill=%22white%22 opacity=%22.85%22/><rect x=%2238%22 y=%2244%22 width=%224%22 height=%2216%22 rx=%222%22 fill=%22white%22 opacity=%22.85%22/><rect x=%2228%22 y=%2248%22 width=%224%22 height=%228%22 rx=%222%22 fill=%22white%22 opacity=%22.6%22/><rect x=%2248%22 y=%2248%22 width=%224%22 height=%228%22 rx=%222%22 fill=%22white%22 opacity=%22.6%22/></svg>')" />
    </div>
    <div class="mp-mini-info" id="mpMiniInfo">
      <div class="mp-mini-title-wrap" id="mpMiniTitleWrap">
        <span class="mp-mini-title" id="mpMiniTitle">未在播放</span>
      </div>
      <div class="mp-mini-artist" id="mpMiniArtist">—</div>
    </div>
    <div class="mp-mini-btns">
      <button class="mp-btn" style="width:28px;height:28px;border-radius:8px;flex-shrink:0" title="播放列表" onclick="event.stopPropagation();togglePlaylist(event)">
        <svg width="14" height="14" viewBox="0 0 16 16"><rect x="1" y="2" width="14" height="2" rx="1" fill="currentColor"/><rect x="1" y="7" width="10" height="2" rx="1" fill="currentColor"/><rect x="1" y="12" width="8" height="2" rx="1" fill="currentColor"/></svg>
      </button>
      <button class="mp-btn" style="width:28px;height:28px;border-radius:8px;flex-shrink:0" title="上一曲" onclick="event.stopPropagation();prevTrack()">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><rect x="11" y="4" width="2" height="12" rx="0.6" fill="currentColor"/><path d="M3 10l8-6v12L3 10z" fill="currentColor"/></svg>
      </button>
      <button class="mp-btn mp-btn-play-mini" id="mmPlayPauseBtn" title="播放" onclick="event.stopPropagation();togglePlay()">
        <svg width="16" height="16" viewBox="0 0 22 22" id="mmPlaySvg"><polygon points="7,3 19,11 7,19" fill="currentColor"/></svg>
        <svg width="16" height="16" viewBox="0 0 22 22" id="mmPauseSvg" style="display:none"><rect x="5" y="3" width="4" height="16" rx="1" fill="currentColor"/><rect x="13" y="3" width="4" height="16" rx="1" fill="currentColor"/></svg>
      </button>
      <button class="mp-btn" style="width:28px;height:28px;border-radius:8px;flex-shrink:0" title="下一曲" onclick="event.stopPropagation();nextTrack()">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none"><rect x="7" y="4" width="2" height="12" rx="0.6" fill="currentColor"/><path d="M17 10l-8-6v12l8-6z" fill="currentColor"/></svg>
      </button>
    </div>
  </div>
  <!-- Progress bar (thin top strip) -->
  <div class="mp-progress-bar" id="mpProgressBar">
    <div class="mp-progress-fill" id="mpProgressFill"></div>
    <div class="mp-progress-thumb" id="mpProgressThumb"></div>
  </div>

  <!-- SECTION 1: Cover + Info -->
  <div class="mp-cover-section">
    <div class="mp-cover" id="mpCover">
      <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 160 160'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%237c5ce7'/%3E%3Cstop offset='100%25' stop-color='%23d9467a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='160' height='160' rx='28' fill='url(%23g)'/%3E%3Ccircle cx='80' cy='58' r='28' fill='none' stroke='white' stroke-width='3.5' opacity='.85'/%3E%3Ccircle cx='80' cy='58' r='8' fill='white' opacity='.85'/%3E%3Crect x='77' y='86' width='6' height='34' rx='3' fill='white' opacity='.85'/%3E%3Crect x='56' y='96' width='6' height='16' rx='3' fill='white' opacity='.6'/%3E%3Crect x='98' y='96' width='6' height='16' rx='3' fill='white' opacity='.6'/%3E%3C/svg%3E" alt="" id="mpCoverImg"
        onerror="this.onerror=null;this.src='data:image/svg+xml,'+encodeURIComponent('<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 160 160%22><defs><linearGradient id=%22g%22 x1=%220%22 y1=%220%22 x2=%22100%22 y2=%22100%22><stop offset=%220%22 stop-color=%22%237c5ce7%22/><stop offset=%22100%22 stop-color=%22%23d9467a%22/></linearGradient></defs><rect width=%22160%22 height=%22160%22 rx=%2228%22 fill=%22url(%23g)%22/><circle cx=%2280%22 cy=%2258%22 r=%2228%22 fill=%22none%22 stroke=%22white%22 stroke-width=%223.5%22 opacity=%22.85%22/><circle cx=%2280%22 cy=%2258%22 r=%228%22 fill=%22white%22 opacity=%22.85%22/><rect x=%2277%22 y=%2286%22 width=%226%22 height=%2234%22 rx=%223%22 fill=%22white%22 opacity=%22.85%22/><rect x=%2256%22 y=%2296%22 width=%226%22 height=%2216%22 rx=%223%22 fill=%22white%22 opacity=%22.6%22/><rect x=%2298%22 y=%2296%22 width=%226%22 height=%2216%22 rx=%223%22 fill=%22white%22 opacity=%22.6%22/></svg>')" />
    </div>
    <div class="mp-title" id="mpTitle">未在播放</div>
    <div class="mp-artist" id="mpArtist">点击歌曲开始收听</div>
    <div class="mp-section-divider"></div>
  </div>

  <!-- SECTION 2: Lyrics block -->
  <div class="mp-lyric-block hidden" id="mpInlineLyric">
    <div class="mp-lyric-current" id="mpLyricCurrent">点击 📜 加载歌词</div>
    <div class="mp-lyric-next" id="mpLyricNext"></div>
  </div>

  <!-- SECTION 3: Main controls — centered tri-button -->
  <div class="mp-main-ctrls">
    <button class="mp-btn mp-btn-ctrl" title="上一曲" onclick="prevTrack()">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="11" y="4" width="2" height="12" rx="0.6" fill="currentColor"/><path d="M3 10l8-6v12L3 10z" fill="currentColor"/></svg>
    </button>
    <button class="mp-btn mp-btn-play" id="mpPlayBtn" title="播放" onclick="togglePlay()">
      <svg width="24" height="24" viewBox="0 0 22 22" fill="none" id="mpPlayIcon"><polygon points="7,3 19,11 7,19" fill="currentColor"/></svg>
      <svg width="24" height="24" viewBox="0 0 22 22" fill="none" id="mpPauseIcon" style="display:none"><rect x="5" y="3" width="4" height="16" rx="1" fill="currentColor"/><rect x="13" y="3" width="4" height="16" rx="1" fill="currentColor"/></svg>
    </button>
    <button class="mp-btn mp-btn-ctrl" title="下一曲" onclick="nextTrack()">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><rect x="7" y="4" width="2" height="12" rx="0.6" fill="currentColor"/><path d="M17 10l-8-6v12l8-6z" fill="currentColor"/></svg>
    </button>
  </div>

  <!-- SECTION 4: Bottom toolbar -->
  <div class="mp-bottom-bar">
    <div class="mp-bottom-left">
      <button class="mp-btn mp-btn-sm" id="mpModeBtn" onclick="toggleMode()" title="循环模式">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" id="mpModeLoop"><path d="M17 2l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 11V9a4 4 0 014-4h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M7 22l-4-4 4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 13v2a4 4 0 01-4 4H3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" id="mpModeSingle" style="display:none"><path d="M17 2l4 4-4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 11V9a4 4 0 014-4h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><text x="12" y="20" text-anchor="middle" font-size="10" font-weight="700" fill="currentColor">1</text></svg>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" id="mpModeShuffle" style="display:none"><path d="M16 3h5v5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 20L21 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M21 16v5h-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M15 15l6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M4 4l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      </button>
      <button class="mp-btn mp-btn-sm" id="mpLyricBtn" title="歌词" onclick="toggleLyric()" style="font-size:13px;font-weight:700;letter-spacing:-.02em">词</button>
    </div>
    <div class="mp-bottom-center">
      <button class="mp-btn mp-btn-sm" id="mpVolBtn" title="音量" onclick="toggleMute()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" id="mpVolIcon"><path d="M2 5.5v5h2.5L8 14V2L4.5 5.5H2z" fill="currentColor"/><path d="M10.5 4.5a4.5 4.5 0 010 7M12.5 2a8 8 0 010 12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/></svg>
      </button>
      <input type="range" class="mp-vol-slider" id="mpVolSlider" min="0" max="100" value="70" oninput="setVolume(this.value)" />
      <span class="mp-time" id="mpTime">0:00 / 0:00</span>
    </div>
    <div class="mp-bottom-right">
      <button class="mp-btn mp-btn-sm" id="mpPlaylistBtn" title="播放列表" onclick="togglePlaylist(event)">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="2" rx="1" fill="currentColor"/><rect x="1" y="7" width="10" height="2" rx="1" fill="currentColor"/><rect x="1" y="12" width="8" height="2" rx="1" fill="currentColor"/></svg>
      </button>
      <button class="mp-btn mp-btn-sm" id="mpMinimizeBtn" title="最小化" onclick="minimizePlayer()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="2" y="7" width="12" height="2" rx="1" fill="currentColor"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Standalone playlist popup (bottom sheet) -->
<div class="mp-playlist-backdrop" id="mpPlBackdrop"></div>
<div class="mp-playlist-popup" id="mpPlaylistPopup">
  <div class="mp-pl-header">
    <span id="mpPlHeaderText">播放列表</span>
    <span class="mp-pl-count" id="mpPlCount">0 首</span>
    <button class="mp-btn mp-btn-sm" onclick="togglePlaylist()" style="margin-left:auto;width:28px;height:28px;font-size:14px">✕</button>
  </div>
  <div class="mp-pl-list" id="mpPlList"></div>
</div>
<audio id="mpAudio" preload="none"></audio>

<!-- Aurora nebula particle canvas -->
<canvas id="auroraCanvas" style="position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity .8s ease" width="10" height="10"></canvas>

<script src="assets/js/app.js"></script>
<script src="assets/js/aurora.js"></script>

</body>
