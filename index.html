<!DOCTYPE html>
<html lang="zh-CN" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<title>StudyNotes — Android · Kotlin · Rust · 算法</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════
   StudyNotes — V3 Docs Site + Dark Mode + Auto-discovery
   ════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── Design Tokens (Light) ── */
:root{
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  --font-mono:'Cascadia Code','JetBrains Mono','Fira Code','Consolas',monospace;
  --sb-w:272px;--toc-w:224px;--nav-h:56px;
  /* Surface */
  --c-bg:#ffffff;--c-bg2:#f8fafc;--c-bg3:#f1f5f9;
  /* Text */
  --c-t1:#0f172a;--c-t2:#1e293b;--c-t3:#334155;--c-tm:#64748b;--c-tm2:#94a3b8;
  /* Border */
  --c-bd:#e2e8f0;--c-bd2:#f1f5f9;
  /* Accent */
  --c-ac:#0ea5e9;--c-acl:#38bdf8;--c-acbg:rgba(14,165,233,.08);--c-acbd:rgba(14,165,233,.25);
  /* Hero — light, harmonious */
  --hero-from:#f2f6fc;--hero-mid:#eaf0f9;--hero-to:#f5f8fc;
  --hero-text:#0f172a;--hero-dim:#475569;--hero-stat-bd:rgba(15,23,42,.06);
  --hero-search-bg:rgba(15,23,42,.025);--hero-search-bd:rgba(15,23,42,.08);
  --hero-search-txt:rgba(71,85,105,.7);--hero-search-kbd-bg:rgba(15,23,42,.04);
  --hero-dot:rgba(15,23,42,.03);
  /* Nav glass */
  --nav-bg:rgba(255,255,255,.9);--nav-bd:var(--c-bd);
  /* Code */
  --code-bg:#f1f5f9;--code-clr:#c026d3;
  --pre-bg:#0f172a;--pre-bd:rgba(255,255,255,.06);--pre-clr:#e2e8f0;
  /* Shadow */
  --sh-sm:0 1px 3px rgba(15,23,42,.04);--sh-md:0 4px 24px rgba(15,23,42,.08);
  --sh-lg:0 24px 80px rgba(15,23,42,.15);
  /* Blockquote */
  --bq-bg:var(--c-acbg);--bq-bd:var(--c-ac);
  /* Misc */
  --overlay-bg:rgba(15,23,42,.25);
}

/* ── Design Tokens (Dark) ── */
[data-theme=dark]{
  --c-bg:#0a0f1a;--c-bg2:#111827;--c-bg3:#1a2332;
  --c-t1:#e2e8f0;--c-t2:#cbd5e1;--c-t3:#94a3b8;--c-tm:#64748b;--c-tm2:#475569;
  --c-bd:#1e293b;--c-bd2:#1a2332;
  --c-acbg:rgba(14,165,233,.12);--c-acbd:rgba(14,165,233,.3);
  --hero-from:#020d1f;--hero-mid:#0a1a30;--hero-to:#020d1f;
  --hero-text:#f1f5f9;--hero-dim:#94a3b8;--hero-stat-bd:rgba(255,255,255,.06);
  --hero-search-bg:rgba(255,255,255,.05);--hero-search-bd:rgba(255,255,255,.08);
  --hero-search-txt:rgba(148,163,184,.7);--hero-search-kbd-bg:rgba(255,255,255,.06);
  --hero-dot:rgba(255,255,255,.035);
  --nav-bg:rgba(10,15,26,.9);--nav-bd:var(--c-bd);
  --code-bg:#1e293b;--code-clr:#f472b6;
  --pre-bg:#0d1520;--pre-bd:rgba(255,255,255,.05);--pre-clr:#e2e8f0;
  --sh-sm:0 1px 3px rgba(0,0,0,.25);--sh-md:0 4px 24px rgba(0,0,0,.35);
  --sh-lg:0 24px 80px rgba(0,0,0,.5);
  --bq-bg:rgba(14,165,233,.1);--bq-bd:var(--c-ac);
  --overlay-bg:rgba(0,0,0,.55);
  color-scheme:dark;
}

html{font-family:var(--font-sans);background:var(--c-bg);color:var(--c-t1);-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--c-bd);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--c-tm2)}

/* ═══ TOP NAV ═══ */
.topnav{
  position:sticky;top:0;z-index:500;height:var(--nav-h);
  background:var(--nav-bg);backdrop-filter:blur(16px)saturate(1.6);
  border-bottom:1px solid var(--nav-bd);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;gap:16px;
}
.tn-left{display:flex;align-items:center;gap:16px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:800;letter-spacing:-.025em;color:var(--c-t1);cursor:pointer}
.logo-mark{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(145deg,#0f172a,#1e3a5f);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;font-family:var(--font-mono);
  box-shadow:0 2px 8px rgba(15,23,42,.25),inset 0 1px 0 rgba(255,255,255,.1)
}
.tn-divider{width:1px;height:20px;background:var(--c-bd);flex-shrink:0}
.tn-breadcrumb{font-size:13px;color:var(--c-tm);display:flex;align-items:center;gap:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tn-breadcrumb .seg{color:var(--c-t1);font-weight:500}

.tn-right{display:flex;align-items:center;gap:8px}
.nav-search{
  display:flex;align-items:center;gap:8px;border:1px solid var(--c-bd);
  border-radius:8px;padding:6px 12px;width:230px;cursor:pointer;
  background:var(--c-bg2);transition:all .15s;flex-shrink:0
}
.nav-search:hover{border-color:var(--c-acl);background:var(--c-bg);box-shadow:0 0 0 3px var(--c-acbg)}
.nav-search .ns-icon{color:var(--c-tm2);flex-shrink:0}
.nav-search .ns-text{flex:1;font-size:13px;color:var(--c-tm2)}
.nav-search kbd{font:11px/1 var(--font-mono);color:var(--c-tm);background:var(--c-bg3);border:1px solid var(--c-bd);padding:2px 6px;border-radius:4px}

/* Theme toggle */
.theme-btn{
  display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:8px;transition:all .15s;
  color:var(--c-tm);flex-shrink:0
}
.theme-btn:hover{background:var(--c-bg2);color:var(--c-t1)}
.theme-btn svg{width:18px;height:18px}

.nav-gh{
  display:flex;align-items:center;gap:6px;
  font-size:13px;font-weight:500;color:var(--c-t3);
  padding:6px 12px;border-radius:8px;transition:all .12s
}
.nav-gh:hover{background:var(--c-bg2);color:var(--c-t1)}
.nav-menu-btn{display:none;padding:6px;color:var(--c-t1)}

/* ═══ HERO — light harmonious ═══ */
.hero{
  position:relative;overflow:hidden;
  background:linear-gradient(170deg,var(--hero-from)0%,var(--hero-mid)45%,var(--hero-to)100%);
  color:var(--hero-text);padding:88px 48px 80px;
  border-bottom:1px solid var(--c-bd2)
}
.hero::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(var(--hero-dot)1px,transparent 1px);
  background-size:28px 28px;pointer-events:none
}
.hero::after{
  content:'';position:absolute;top:-100px;right:-60px;
  width:500px;height:500px;
  background:radial-gradient(circle at 60% 40%,var(--c-acbg)0%,transparent 65%);
  pointer-events:none
}
.hero-glow2{
  position:absolute;bottom:-60px;left:-40px;
  width:350px;height:350px;
  background:radial-gradient(circle,rgba(99,102,241,.06)0%,transparent 60%);
  pointer-events:none
}
.hero-inner{position:relative;z-index:1;max-width:840px}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:7px;
  font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--c-ac);background:var(--c-acbg);border:1px solid var(--c-acbd);
  border-radius:100px;padding:5px 16px;margin-bottom:28px
}
.hero-eyebrow-dot{width:6px;height:6px;border-radius:50%;background:var(--c-acl);flex-shrink:0}
.hero h1{font-size:52px;font-weight:800;line-height:1.1;letter-spacing:-.04em;margin-bottom:20px}
.hero h1 em{font-style:normal;color:var(--c-ac)}
.hero h1 .dim{opacity:.35}

.hero-desc{font-size:16.5px;color:var(--hero-dim);line-height:1.75;max-width:580px;margin-bottom:36px}
.hero-search{
  display:flex;align-items:center;gap:10px;
  background:var(--hero-search-bg);border:1px solid var(--hero-search-bd);
  border-radius:10px;padding:13px 18px;max-width:520px;cursor:pointer;transition:all .2s
}
.hero-search:hover{background:var(--c-acbg);border-color:var(--c-acbd);box-shadow:0 0 0 4px rgba(14,165,233,.06)}
.hero-search .hs-icon{color:var(--hero-search-txt);flex-shrink:0;opacity:.6}
.hero-search .hs-text{flex:1;font-size:15px;color:var(--hero-search-txt)}
.hero-search kbd{font:11px/1 var(--font-mono);color:var(--hero-search-txt);background:var(--hero-search-kbd-bg);border:1px solid var(--hero-search-bd);padding:3px 8px;border-radius:5px}

.hero-stats{
  display:flex;gap:0;margin-top:48px;
  border-top:1px solid var(--hero-stat-bd);padding-top:36px
}
.hero-stat{flex:1;padding:0 36px;border-right:1px solid var(--hero-stat-bd)}
.hero-stat:first-child{padding-left:0}
.hero-stat:last-child{border-right:none;padding-right:0}
.hs-num{font-size:38px;font-weight:800;letter-spacing:-.03em;line-height:1;margin-bottom:6px}
.hs-num span{color:var(--c-ac)}
.hs-label{font-size:13px;color:var(--hero-dim)}

/* ═══ SEARCH OVERLAY ═══ */
.overlay{
  position:fixed;inset:0;z-index:900;
  background:var(--overlay-bg);backdrop-filter:blur(3px);display:none
}
.overlay.show{display:block}
.search-panel{
  position:absolute;top:68px;left:50%;transform:translateX(-50%);
  width:640px;max-width:94vw;
  background:var(--c-bg);border:1px solid var(--c-bd);
  border-radius:14px;overflow:hidden;box-shadow:var(--sh-lg)
}
.sp-input-wrap{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--c-bd2)}
.sp-input-wrap svg{color:var(--c-tm2);flex-shrink:0}
.sp-input-wrap input{flex:1;border:none;outline:none;font:15px/1 var(--font-sans);color:var(--c-t1);background:transparent}
.sp-input-wrap input::placeholder{color:var(--c-tm2)}
.sp-esc{font:11px/1 var(--font-mono);color:var(--c-tm);background:var(--c-bg3);border:1px solid var(--c-bd);padding:2px 7px;border-radius:4px;white-space:nowrap}
.sp-results{max-height:420px;overflow-y:auto;padding:4px 0}
.sp-empty{padding:36px;text-align:center;color:var(--c-tm2);font-size:14px}
.sp-item{display:flex;align-items:flex-start;gap:12px;padding:12px 20px;cursor:pointer;transition:background .1s}
.sp-item:hover{background:var(--c-bg2)}
.sp-item-body{flex:1;min-width:0}
.sp-item-cat{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px}
.sp-item-title{font-size:14px;font-weight:500;color:var(--c-t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sp-item-meta{font-size:12px;color:var(--c-tm2);margin-top:2px}
.sp-item-arrow{color:var(--c-tm2);flex-shrink:0;margin-top:2px}

/* ═══ LAYOUT ═══ */
.layout{display:flex;min-height:calc(100vh - var(--nav-h))}

/* ── Sidebar ── */
.sidebar{
  width:var(--sb-w);flex-shrink:0;background:var(--c-bg);
  border-right:1px solid var(--c-bd);
  position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));
  overflow-y:auto;padding:16px 0 24px
}
.sb-home{display:flex;align-items:center;gap:8px;padding:7px 16px;margin:0 8px 8px;border-radius:7px;font-size:13px;font-weight:600;color:var(--c-t3);cursor:pointer;transition:all .12s}
.sb-home:hover{background:var(--c-bg2);color:var(--c-t1)}
.sb-home.active{background:var(--c-acbg);color:var(--c-ac)}
.sb-sep{height:1px;background:var(--c-bd2);margin:6px 16px 10px}
.sb-group{margin-bottom:2px}
.sb-group-header{display:flex;align-items:center;gap:7px;padding:6px 16px;margin:0 8px;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--c-t3);transition:all .12s;user-select:none}
.sb-group-header:hover{background:var(--c-bg2);color:var(--c-t1)}
.sb-group-header .arrow{font-size:9px;color:var(--c-tm2);transition:transform .18s;display:inline-block;flex-shrink:0}
.sb-group-header .arrow.open{transform:rotate(90deg)}
.sb-group-header .gb-name{flex:1}
.sb-group-header .gb-count{font-size:11px;font-family:var(--font-mono);color:var(--c-tm2);background:var(--c-bg3);padding:1px 6px;border-radius:10px}
.sb-items{padding:0 8px}
.sb-items.collapsed{display:none}
.sb-item{display:flex;align-items:center;gap:7px;padding:5px 10px 5px 24px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--c-t3);transition:all .1s}
.sb-item:hover{background:var(--c-bg2);color:var(--c-t1)}
.sb-item.active{background:var(--c-acbg);color:var(--c-ac);font-weight:600}
.sb-item .si-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sb-item .si-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Content ── */
.content-area{flex:1;min-width:0;display:flex}
.content-main{flex:1;min-width:0}
.toc-rail{
  width:var(--toc-w);flex-shrink:0;
  position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));
  padding:32px 20px 32px 0;overflow-y:auto;display:none
}
.toc-rail.show{display:block}
.toc-heading{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--c-tm);margin-bottom:12px}
.toc-link{display:block;padding:4px 0 4px 12px;font-size:12.5px;color:var(--c-tm2);border-left:2px solid transparent;cursor:pointer;transition:all .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.toc-link:hover{color:var(--c-t1);border-left-color:var(--c-tm2)}
.toc-link.active{color:var(--c-ac);border-left-color:var(--c-ac);font-weight:600}
.toc-link.lv3{padding-left:22px;font-size:12px}

/* ═══ HOME ═══ */
.home-body{padding:40px 48px 72px;max-width:1080px}
.section-title{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--c-tm);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--c-bd2)}

.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:14px;margin-bottom:16px}
.cat-card{background:var(--c-bg);border:1px solid var(--c-bd);border-radius:12px;padding:22px 24px;cursor:pointer;transition:all .2s;display:block}
.cat-card:hover{border-color:var(--c-acbd);box-shadow:var(--sh-md),0 1px 6px rgba(14,165,233,.06);transform:translateY(-2px)}
.cc-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.cc-icon{width:38px;height:38px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--c-bg3)}
.cc-body{flex:1;min-width:0}
.cc-name{font-size:14px;font-weight:700;color:var(--c-t1);margin-bottom:2px}
.cc-count{font-size:12px;font-family:var(--font-mono);color:var(--c-tm);background:var(--c-bg3);padding:1px 7px;border-radius:10px;display:inline-block}
.cc-desc{font-size:12.5px;color:var(--c-tm);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cc-footer{margin-top:14px;padding-top:12px;border-top:1px solid var(--c-bd2);display:flex;align-items:center;gap:6px}
.cc-tag{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:500}

/* ═══ CATEGORY PAGE ═══ */
.cat-page{padding:36px 48px 64px;max-width:920px}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--c-tm);margin-bottom:28px;flex-wrap:wrap}
.breadcrumb a{color:var(--c-ac);cursor:pointer;transition:opacity .1s}
.breadcrumb a:hover{opacity:.75}
.breadcrumb .sep{color:var(--c-tm2)}
.page-hero{margin-bottom:32px}
.page-hero h1{font-size:28px;font-weight:800;letter-spacing:-.025em;color:var(--c-t1);margin-bottom:6px}
.page-hero p{font-size:14px;color:var(--c-tm)}
.article-list-label{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--c-tm);padding:0 0 8px;margin-bottom:6px;border-bottom:1px solid var(--c-bd2)}
.article-row{display:flex;align-items:center;gap:14px;padding:10px 12px;border-radius:7px;cursor:pointer;transition:all .12s;font-size:14px;color:var(--c-t1);border:1px solid transparent;margin-bottom:2px}
.article-row:hover{background:var(--c-bg2);border-color:var(--c-bd)}
.ar-num{font:700 11.5px/1 var(--font-mono);color:var(--c-tm2);min-width:28px;text-align:right;flex-shrink:0}
.ar-title{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.ar-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ar-arrow{color:var(--c-tm2);opacity:0;transition:opacity .12s}
.article-row:hover .ar-arrow{opacity:1}

/* ═══ ARTICLE ═══ */
.article-wrap{padding:36px 48px 64px;max-width:840px}
.article-header{margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--c-bd)}
.ah-cat-badge{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.article-header h1{font-size:30px;font-weight:800;letter-spacing:-.025em;line-height:1.22;color:var(--c-t1);margin-bottom:14px}
.ah-meta{display:flex;align-items:center;gap:12px;font-size:12.5px;color:var(--c-tm);flex-wrap:wrap}
.ah-tag{font-size:11px;padding:3px 9px;border-radius:5px;font-weight:600}

.article-body{font-size:15px;line-height:1.82;color:var(--c-t3)}
.article-body h2{font-size:21px;font-weight:700;margin:40px 0 14px;padding-bottom:10px;border-bottom:1px solid var(--c-bd2);color:var(--c-t1);letter-spacing:-.02em}
.article-body h3{font-size:17px;font-weight:600;margin:30px 0 10px;color:var(--c-t1)}
.article-body h4{font-size:15px;font-weight:600;margin:24px 0 8px;color:var(--c-t2)}
.article-body p{margin:12px 0}
.article-body a{color:var(--c-ac);text-decoration:underline;text-underline-offset:2px}
.article-body a:hover{opacity:.8}
.article-body blockquote{border-left:3px solid var(--bq-bd);margin:16px 0;padding:10px 20px;background:var(--bq-bg);border-radius:0 8px 8px 0;color:var(--c-t2)}
.article-body blockquote p{margin:4px 0}
.article-body ul,.article-body ol{padding-left:24px;margin:12px 0}
.article-body li{margin:5px 0}
.article-body code{font:87%/1.4 var(--font-mono);background:var(--code-bg);color:var(--code-clr);padding:2px 7px;border-radius:5px;word-break:break-all}
.article-body pre{background:var(--pre-bg)!important;border-radius:10px;padding:20px 24px;overflow-x:auto;margin:18px 0;font:13.5px/1.7 var(--font-mono),monospace!important;color:var(--pre-clr)!important;border:1px solid var(--pre-bd);box-shadow:0 4px 20px rgba(0,0,0,.15);display:block!important;position:relative}
.article-body pre code{background:none!important;color:inherit!important;padding:0;font-size:inherit;border-radius:0;word-break:normal;display:block!important}
.article-body img{max-width:100%;border-radius:9px;margin:16px 0;border:1px solid var(--c-bd);display:block}
.article-body table{border-collapse:collapse;width:100%;margin:18px 0;font-size:14px}
.article-body th,.article-body td{border:1px solid var(--c-bd);padding:10px 16px;text-align:left}
.article-body th{background:var(--c-bg2);font-weight:600;font-size:13px;color:var(--c-t1)}
.article-body tr:hover td{background:var(--c-bg2)}
.article-body hr{border:none;border-top:1px solid var(--c-bd);margin:32px 0}
.article-body mark{background:rgba(251,191,36,.25);color:inherit;padding:1px 5px;border-radius:3px}

// ════════════════════════════════════════════════
//  THEME SYSTEM  (auto → light → dark cycle)
// ════════════════════════════════════════════════
(function initTheme(){
  const saved = localStorage.getItem('sn-theme') || 'auto';
  applyTheme(saved);

  // Listen for system preference changes (only when "auto")
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',function(){
    if(localStorage.getItem('sn-theme')==='auto') applyTheme('auto');
  });
})();

function applyTheme(mode){
  const html = document.documentElement;
  if(mode==='auto'){
    const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    html.setAttribute('data-theme', sysDark ? 'dark' : 'light');
  } else {
    html.setAttribute('data-theme', mode);
  }
  localStorage.setItem('sn-theme', mode);
  updateThemeIcon(mode);
}

function cycleTheme(){
  const map = {auto:'light', light:'dark', dark:'auto'};
  const cur = localStorage.getItem('sn-theme')||'auto';
  applyTheme(map[cur]||'auto');
}

function updateThemeIcon(mode){
  const sun = document.getElementById('themeIconSun');
  const moon = document.getElementById('themeIconMoon');
  const btn = document.getElementById('themeBtn');
  if(!sun||!moon||!btn) return;
  if(mode==='dark'){
    sun.style.display='none'; moon.style.display='block';
    btn.title='浅色模式';
  } else if(mode==='light'){
    sun.style.display='block'; moon.style.display='none';
    btn.title='夜间模式';
  } else {
    // auto
    const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    sun.style.display=sysDark?'none':'block';
    moon.style.display=sysDark?'block':'none';
    btn.title='自动 · 点击切换';
  }
}

function getThemeMode(){ return localStorage.getItem('sn-theme')||'auto'; }

// ════════════════════════════════════════════════
//  MARKDOWN PARSER
// ════════════════════════════════════════════════
function parseMD(src){
  if(!src||!src.trim()) return '<p class="empty">（本文档暂无内容）</p>';
  const lines=src.split('\n');let html='',i=0;
  let inCB=false,codeLang='',codeLines=[];
  let inTable=false,tableRows=[];
  let paraLines=[];

  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const esca=s=>s.replace(/&/g,'&amp;').replace(/"/g,'&quot;');

  function inline(s){
    s=esc(s);
    s=s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" loading="lazy">');
    s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
    s=s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
    s=s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
    s=s.replace(/\*(.+?)\*/g,'<em>$1</em>');
    s=s.replace(/~~(.+?)~~/g,'<del>$1</del>');
    s=s.replace(/==(.+?)==/g,'<mark>$1</mark>');
    s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
    return s;
  }

  function flushPara(){const t=paraLines.join(' ').trim();if(t)html+='<p>'+inline(t)+'</p>\n';paraLines=[];}
  function flushCode(){const cls=codeLang?' class="lang-'+esca(codeLang.toLowerCase())+'"':'';html+='<pre><code'+cls+'>'+esc(codeLines.join('\n'))+'\n</code></pre>\n';codeLines=[];codeLang='';inCB=false;}

  function flushTable(){
    if(!tableRows.length)return;
    let thead='',tbody='';
    for(let r=0;r<tableRows.length;r++){
      const cells=tableRows[r];
      if(r===1&&cells.every(c=>/^:?-{3,}:?$/.test(c.trim())))continue;
      const row='<tr>'+cells.map(cc=>{const ch=inline(cc.trim());return r===0?'<th>'+ch+'</th>':'<td>'+ch+'</td>';}).join('')+'</tr>\n';
      if(r===0)thead=row;else tbody+=row;
    }
    html+='<table>\n'+(thead?'<thead>\n'+thead+'</thead>\n':'')+'<tbody>\n'+tbody+'</tbody>\n</table>\n';
    tableRows=[];inTable=false;
  }

  while(i<lines.length){
    const line=lines[i];
    const fm=line.match(/^(`{3,}|~{3,})\s*(\S*)/);
    if(fm&&!inCB){flushPara();if(inTable)flushTable();inCB=true;codeLang=fm[2]||'';codeLines=[];i++;continue;}
    if(inCB){if(line.match(/^(`{3,}|~{3,})\s*$/))flushCode();else codeLines.push(line);i++;continue;}
    if(/^\s*\|.*\|/.test(line)){flushPara();if(!inTable){inTable=true;tableRows=[];}tableRows.push(line.trim().replace(/^\||\|$/g,'').split('|'));i++;continue;}
    else if(inTable){flushTable();}
    if(line.trim()===''){flushPara();i++;continue;}
    if(line.trim()==='[TOC]'){i++;continue;}
    const hm=line.match(/^(#{1,6})\s+(.+)/);
    if(hm){
      flushPara();
      const lv=hm[1].length;
      const txt=inline(hm[2].trim());
      const id=slugify(hm[2].trim());
      html+='<h'+lv+' id="'+id+'">'+txt+'</h'+lv+'>\n';
      i++;continue;
    }
    if(/^(-{3,}|_{3,}|\*{3,})\s*$/.test(line.trim())){flushPara();html+='<hr>\n';i++;continue;}
    if(line.trim().startsWith('>')){
      flushPara();let bq=[];
      while(i<lines.length&&lines[i].trim().startsWith('>')){bq.push(lines[i].trim().replace(/^>\s?/,''));i++;}
      html+='<blockquote>\n'+parseMD(bq.join('\n'))+'</blockquote>\n';continue;
    }
    if(/^(\s*)([-*+]|\d+\.)\s+/.test(line)){
      flushPara();const isOl=/^\s*\d+\./.test(line);const tag=isOl?'ol':'ul';
      const items=[];const baseIndent=line.match(/^(\s*)/)[1].length;
      while(i<lines.length){
        const ln=lines[i];
        if(/^(\s*)([-*+]|\d+\.)\s+/.test(ln)&&ln.match(/^(\s*)/)[1].length===baseIndent){items.push(ln.trim().replace(/^([-*+]|\d+\.)\s+/,''));i++;if(i<lines.length&&lines[i].trim()===''){i++;break;}}
        else break;
      }
      html+='<'+tag+'>\n'+items.map(it=>'<li>'+inline(it)+'</li>').join('\n')+'\n</'+tag+'>\n';continue;
    }
    paraLines.push(line);i++;
  }
  flushPara();if(inTable)flushTable();if(inCB)flushCode();
  return html;
}

// ════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════
function hEsc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function slugify(s){return s.toLowerCase().replace(/[^\w\u4e00-\u9fff]+/g,'-').replace(/^-|-$/g,'')||'h'}
function hlMatch(t,q){
  if(!q)return t;
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return t.replace(re,'<mark style="background:rgba(251,191,36,.3);padding:0 2px;border-radius:2px">$1</mark>');
}

function nav(hash){history.pushState(null,'',location.pathname+'#'+hash);route();}

function route(){
  const h=location.hash.slice(1)||'/';
  if(!h||h==='/')renderHome();
  else if(h.startsWith('article/')){const n=parseInt(h.split('/')[1]);(n>=0&&n<ART.length)?loadArticle(n):renderHome();}
  else if(h.startsWith('cat/'))renderCat(h.slice(4));
  else renderHome();
}

function renderSidebar(activeCat,activeIdx){
  const sb=document.getElementById('sidebar');if(!sb)return;
  const isHome=activeCat===null&&activeIdx===undefined;

  let H=`<a class="sb-home ${isHome?'active':''}" onclick="goHome()">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="flex-shrink:0"><path d="M1 6.5L7 1.5L13 6.5V13H9V9H5V13H1V6.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" fill="none"/></svg>
    首页
  </a>
  <div class="sb-sep"></div>`;

  for(const k of CAT_ORDER){
    const cat=CAT_DEF[k];
    const list=ART.map((a,i)=>({...a,_i:i})).filter(a=>a.c===k);
    if(!list.length)continue;
    const isGroupActive=activeIdx!==undefined&&ART[activeIdx]?.c===k;
    const isExpanded=isGroupActive||activeCat===k;
    H+=`<div class="sb-group">
      <div class="sb-group-header" onclick="toggleGroup('${k}')">
        <span class="arrow${isExpanded?' open':''}" id="arr-${k}">▶</span>
        <span class="gb-name">${cat.emoji} ${cat.n}</span>
        <span class="gb-count">${list.length}</span>
      </div>
      <div class="sb-items${isExpanded?'':' collapsed'}" id="grp-${k}">`;
    for(const a of list){
      H+=`<a class="sb-item${activeIdx===a._i?' active':''}" onclick="nav('article/${a._i}')" title="${hEsc(a.t)}">
        <span class="si-dot" style="background:${cat.color}"></span>
        <span class="si-name">${hEsc(a.t)}</span>
      </a>`;
    }
    H+='</div></div>';
  }
  sb.innerHTML=H;
  const activeEl=sb.querySelector('.sb-item.active');
  if(activeEl)setTimeout(()=>activeEl.scrollIntoView({block:'nearest'}),50);
}

function toggleGroup(k){
  const grp=document.getElementById('grp-'+k);
  const arr=document.getElementById('arr-'+k);
  if(!grp)return;
  grp.classList.toggle('collapsed');
  arr.classList.toggle('open');
}

      <span class="ar-title">${hEsc(a.t)}</span>
      <div class="ar-meta">
        <svg class="ar-arrow" width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2.5 6.5h8M7 3l3.5 3.5L7 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
    </div>`;
  }
  H+='</div>';
  root.innerHTML=H;renderSidebar(key);
}

// ════════════════════════════════════════════════
//  RENDER: ARTICLE
// ════════════════════════════════════════════════
async function loadArticle(idx){
  const a=ART[idx];if(!a)return;curIdx=idx;
  const cat=CAT_DEF[a.c]||{n:'其他',emoji:'📋',color:'#64748b'};
  document.title=a.t+' — StudyNotes';
  document.getElementById('navBreadcrumb').innerHTML=`<a onclick="goHome()">首页</a><span class="sep">/</span><a onclick="nav('cat/${a.c}')" class="seg">${cat.emoji} ${cat.n}</a>`;

  const root=document.getElementById('pageRoot');
  root.innerHTML=`<div class="article-wrap">
    <div class="breadcrumb"><a onclick="goHome()">首页</a><span class="sep">/</span><a onclick="nav('cat/${a.c}')">${cat.emoji} ${cat.n}</a></div>
    <div class="article-header"><div class="ah-cat-badge" style="color:${cat.color}">${cat.emoji} ${cat.n}</div><h1>${hEsc(a.t)}</h1></div>
    <div class="loading-state"><div class="spin"></div>正在加载文章内容…</div>
  </div>`;
  renderSidebar(a.c,idx);

  try{
    const base=location.href.split('#')[0].replace(/\/[^/]*\.html.*$/,'/').replace(/\/?$/,'/');
    const resp=await fetch(base+a.p);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const md=await resp.text();
    const bodyHtml=parseMD(md);

    // Build TOC
    const tocItems=[];const hMatches=md.match(/^#{1,4}\s+.+/gm)||[];
    for(const m of hMatches){const lv=m.match(/^#+/)[0].length;const txt=m.replace(/^#+\s+/,'').replace(/\[TOC\]/,'').trim();if(txt)tocItems.push({lv,txt});}

    const tocRail=document.getElementById('tocRail');
    if(tocItems.length>2){tocRail.innerHTML=`<div class="toc-heading">本页目录</div>`+tocItems.map(h=>`<a class="toc-link${h.lv>=3?' lv3':''}" data-target="${slugify(h.txt)}">${hEsc(h.txt)}</a>`).join('');tocRail.classList.add('show');}
    else{tocRail.classList.remove('show');}

    root.innerHTML=`<div class="article-wrap">
      <div class="breadcrumb"><a onclick="goHome()">首页</a><span class="sep">/</span><a onclick="nav('cat/${a.c}')">${cat.emoji} ${cat.n}</a></div>
      <div class="article-header">
        <div class="ah-cat-badge" style="color:${cat.color}">${cat.emoji} ${cat.n}</div>
        <h1>${hEsc(a.t)}</h1>
        <div class="ah-meta">
          <span class="ah-tag" style="background:${cat.color}18;color:${cat.color}">${cat.emoji} ${cat.n}</span>
          <span>${md.length} 字符</span>
          <span>${md.split('\\n').length} 行原文</span>
        </div>
      </div>
      <div class="article-body">${bodyHtml}</div>
    </div>`;

    window.scrollTo(0,0);

    if(tocItems.length>2){
      const heads=root.querySelectorAll('.article-body h2,.article-body h3');
      const onScroll=()=>{let cur=null;heads.forEach(h=>{if(h.getBoundingClientRect().top<=100)cur=h.id;});document.querySelectorAll('.toc-link').forEach(el=>{el.classList.toggle('active',el.getAttribute('data-target')===cur);});};
      window.removeEventListener('scroll',window.__tocScroll);window.__tocScroll=onScroll;window.addEventListener('scroll',onScroll);
      // TOC click — scroll to heading without triggering hash route
      tocRail.onclick=e=>{
        const link=e.target.closest('.toc-link');
        if(!link)return;
        e.preventDefault();
        const targetId=link.getAttribute('data-target');
        const el=document.getElementById(targetId);
        if(el){el.scrollIntoView({behavior:'smooth',block:'start'});history.replaceState(null,'',location.pathname+location.search+'#article/'+idx+'#'+targetId);}
        document.querySelectorAll('.toc-link').forEach(l=>l.classList.remove('active'));
        link.classList.add('active');
      };
    }
  }catch(err){
    document.getElementById('tocRail').classList.remove('show');
    root.innerHTML=`<div class="article-wrap">
      <div class="breadcrumb"><a onclick="goHome()">首页</a><span class="sep">/</span><a onclick="nav('cat/${a.c}')">${cat.emoji} ${cat.n}</a></div>
      <div class="article-header"><div class="ah-cat-badge" style="color:${cat.color}">${cat.emoji} ${cat.n}</div><h1>${hEsc(a.t)}</h1></div>
      <div class="error-card">
        <h3>⚠️ 无法加载文章</h3><p>${hEsc(err.message)}</p><p>文件路径：<code>${hEsc(a.p)}</code></p>
        <p style="font-size:13px;margin-top:8px">请确认 .md 文件已推送到 GitHub 仓库，且路径编码一致。</p>
        <a class="back-link" onclick="goHome()"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M10 6.5H2M5 3 1.5 6.5 5 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>返回首页</a>
      </div>
    </div>`;
  }
}

// ════════════════════════════════════════════════
//  SEARCH
// ════════════════════════════════════════════════
function openSearch(){document.getElementById('overlay').classList.add('show');setTimeout(()=>document.getElementById('searchInput')?.focus(),60);}
function closeSearch(){document.getElementById('overlay').classList.remove('show');const inp=document.getElementById('searchInput');if(inp)inp.value='';document.getElementById('searchResults').innerHTML='<div class="sp-empty">输入关键词开始搜索…</div>';}
function handleOverlayClick(e){if(e.target===document.getElementById('overlay'))closeSearch();}

function doSearch(q){
  const box=document.getElementById('searchResults');
  if(!q||!q.trim()){box.innerHTML='<div class="sp-empty">输入关键词开始搜索…</div>';return;}
  const kw=q.trim().toLowerCase();
  const hits=ART.map((a,i)=>({...a,_i:i})).filter(a=>a.t.toLowerCase().includes(kw)||(CAT_DEF[a.c]?.n||'').toLowerCase().includes(kw)||(CAT_DEF[a.c]?.desc||'').toLowerCase().includes(kw)).slice(0,12);
  if(!hits.length){box.innerHTML='<div class="sp-empty">未找到匹配文章</div>';return;}
  box.innerHTML=hits.map(a=>{
    const c=CAT_DEF[a.c]||{n:'其他',emoji:'📋',color:'#64748b'};
    return`<div class="sp-item" onclick="nav('article/${a._i}');closeSearch()">
      <div class="sp-item-body"><div class="sp-item-cat" style="color:${c.color}">${c.emoji} ${c.n}</div><div class="sp-item-title">${hlMatch(hEsc(a.t),kw)}</div><div class="sp-item-meta">${c.n}</div></div>
      <svg class="sp-item-arrow" width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2.5 6.5h8M7 3l3.5 3.5L7 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>`;
  }).join('');
}

// ════════════════════════════════════════════════
//  MOBILE SIDEBAR
// ════════════════════════════════════════════════
function toggleSidebar(){document.getElementById('sidebar')?.classList.toggle('open');}
document.addEventListener('click',e=>{if(window.innerWidth<=900&&(e.target.closest('.sb-item')||e.target.closest('.sb-home')))document.getElementById('sidebar')?.classList.remove('open');});

// ════════════════════════════════════════════════
//  KEYBOARD
// ════════════════════════════════════════════════
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openSearch();}if(e.key==='Escape')closeSearch();});

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
(function init(){
  window.addEventListener('hashchange', route);
  route();
})();
</script>
