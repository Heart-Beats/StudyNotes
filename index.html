<!DOCTYPE html>
<html lang="zh-CN" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
<meta name="referrer" content="no-referrer">
<title>StudyNotes — Android · Kotlin · Rust · 算法</title>
<!-- highlight.js — syntax highlighting -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/tokyo-night-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/kotlin.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/dart.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/rust.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/java.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/groovy.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/shell.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/json.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/sql.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/bash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════
   StudyNotes — V3 Docs Site + Dark Mode + Auto-discovery
   ════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── Design Tokens (Light) ── */
:root{
  --font-sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  --font-mono:'Cascadia Code','JetBrains Mono','Fira Code','Consolas',monospace;
  --sb-w:272px;--toc-w:224px;--nav-h:56px;
  /* Surface */
  --c-bg:#ffffff;--c-bg2:#f8fafc;--c-bg3:#f1f5f9;
  /* Text */
  --c-t1:#0f172a;--c-t2:#1e293b;--c-t3:#334155;--c-tm:#64748b;--c-tm2:#94a3b8;
  /* Border */
  --c-bd:#e2e8f0;--c-bd2:#f1f5f9;
  /* Accent */
  --c-ac:#0ea5e9;--c-acl:#38bdf8;--c-acbg:rgba(14,165,233,.08);--c-acbd:rgba(14,165,233,.25);
  /* Hero — light, harmonious */
  --hero-from:#f2f6fc;--hero-mid:#eaf0f9;--hero-to:#f5f8fc;
  --hero-text:#0f172a;--hero-dim:#475569;--hero-stat-bd:rgba(15,23,42,.06);
  --hero-search-bg:rgba(15,23,42,.025);--hero-search-bd:rgba(15,23,42,.08);
  --hero-search-txt:rgba(71,85,105,.7);--hero-search-kbd-bg:rgba(15,23,42,.04);
  --hero-dot:rgba(15,23,42,.03);
  /* Nav glass */
  --nav-bg:rgba(255,255,255,.9);--nav-bd:var(--c-bd);
  /* Code */
  --code-bg:#f1f5f9;--code-clr:#c026d3;
  --pre-bg:#0f172a;--pre-bd:rgba(255,255,255,.06);--pre-clr:#e2e8f0;
  /* Shadow */
  --sh-sm:0 1px 3px rgba(15,23,42,.04);--sh-md:0 4px 24px rgba(15,23,42,.08);
  --sh-lg:0 24px 80px rgba(15,23,42,.15);
  /* Blockquote */
  --bq-bg:var(--c-acbg);--bq-bd:var(--c-ac);
  /* Scrollbar — more prominent than default */
  --sb-thumb:#c0c8d4;--sb-thumb-hover:#94a3b8;--sb-track:#f1f5f9;
  /* Misc */
  --overlay-bg:rgba(15,23,42,.25);
}

/* ── Design Tokens (Dark) ── */
[data-theme=dark]{
  --c-bg:#0a0f1a;--c-bg2:#111827;--c-bg3:#1a2332;
  --c-t1:#e2e8f0;--c-t2:#cbd5e1;--c-t3:#94a3b8;--c-tm:#64748b;--c-tm2:#475569;
  --c-bd:#1e293b;--c-bd2:#1a2332;
  --c-acbg:rgba(14,165,233,.12);--c-acbd:rgba(14,165,233,.3);
  --hero-from:#020d1f;--hero-mid:#0a1a30;--hero-to:#020d1f;
  --hero-text:#f1f5f9;--hero-dim:#94a3b8;--hero-stat-bd:rgba(255,255,255,.06);
  --hero-search-bg:rgba(255,255,255,.05);--hero-search-bd:rgba(255,255,255,.08);
  --hero-search-txt:rgba(148,163,184,.7);--hero-search-kbd-bg:rgba(255,255,255,.06);
  --hero-dot:rgba(255,255,255,.035);
  --nav-bg:rgba(10,15,26,.9);--nav-bd:var(--c-bd);
  --code-bg:#1e293b;--code-clr:#f472b6;
  --pre-bg:#0d1520;--pre-bd:rgba(255,255,255,.05);--pre-clr:#e2e8f0;
  --sh-sm:0 1px 3px rgba(0,0,0,.25);--sh-md:0 4px 24px rgba(0,0,0,.35);
  --sh-lg:0 24px 80px rgba(0,0,0,.5);
  --bq-bg:rgba(14,165,233,.1);--bq-bd:var(--c-ac);
  /* Scrollbar — more prominent */
  --sb-thumb:#334155;--sb-thumb-hover:#64748b;--sb-track:#0f172a;
  --overlay-bg:rgba(0,0,0,.55);
  color-scheme:dark;
}

html{font-family:var(--font-sans);background:var(--c-bg);color:var(--c-t1);-webkit-font-smoothing:antialiased;scroll-behavior:smooth}
body{overflow-x:hidden}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;background:none;font:inherit;color:inherit}

::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--sb-track)}
::-webkit-scrollbar-thumb{background:var(--sb-thumb);border-radius:5px;border:2px solid var(--sb-track)}
::-webkit-scrollbar-thumb:hover{background:var(--sb-thumb-hover)}
::-webkit-scrollbar-thumb:active{background:var(--c-tm)}
/* Firefox */
*{scrollbar-width:auto;scrollbar-color:var(--sb-thumb) var(--sb-track)}

/* ═══ TOP NAV ═══ */
.topnav{
  position:sticky;top:0;z-index:500;height:var(--nav-h);
  background:var(--nav-bg);backdrop-filter:blur(16px)saturate(1.6);
  border-bottom:1px solid var(--nav-bd);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;gap:16px;
}
.tn-left{display:flex;align-items:center;gap:16px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:9px;font-size:15px;font-weight:800;letter-spacing:-.025em;color:var(--c-t1);cursor:pointer}
.logo-mark{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(145deg,#0f172a,#1e3a5f);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;font-family:var(--font-mono);
  box-shadow:0 2px 8px rgba(15,23,42,.25),inset 0 1px 0 rgba(255,255,255,.1)
}
.tn-divider{width:1px;height:20px;background:var(--c-bd);flex-shrink:0}
.tn-breadcrumb{font-size:13px;color:var(--c-tm);display:flex;align-items:center;gap:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tn-breadcrumb .seg{color:var(--c-t1);font-weight:500}

.tn-right{display:flex;align-items:center;gap:8px}
.nav-search{
  display:flex;align-items:center;gap:8px;border:1px solid var(--c-bd);
  border-radius:8px;padding:6px 12px;width:230px;cursor:pointer;
  background:var(--c-bg2);transition:all .15s;flex-shrink:0
}
.nav-search:hover{border-color:var(--c-acl);background:var(--c-bg);box-shadow:0 0 0 3px var(--c-acbg)}
.nav-search .ns-icon{color:var(--c-tm2);flex-shrink:0}
.nav-search .ns-text{flex:1;font-size:13px;color:var(--c-tm2)}
.nav-search kbd{font:11px/1 var(--font-mono);color:var(--c-tm);background:var(--c-bg3);border:1px solid var(--c-bd);padding:2px 6px;border-radius:4px}

/* Theme toggle */
.theme-btn{
  display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:8px;transition:all .15s;
  color:var(--c-tm);flex-shrink:0
}
.theme-btn:hover{background:var(--c-bg2);color:var(--c-t1)}
.theme-btn svg{width:18px;height:18px}

.nav-gh{
  display:flex;align-items:center;gap:6px;
  font-size:13px;font-weight:500;color:var(--c-t3);
  padding:6px 12px;border-radius:8px;transition:all .12s
}
.nav-gh:hover{background:var(--c-bg2);color:var(--c-t1)}
.nav-menu-btn{display:none;padding:6px;color:var(--c-t1)}

/* ═══ HERO — light harmonious ═══ */
.hero{
  position:relative;overflow:hidden;
  background:linear-gradient(170deg,var(--hero-from)0%,var(--hero-mid)45%,var(--hero-to)100%);
  color:var(--hero-text);padding:88px 48px 80px;
  border-bottom:1px solid var(--c-bd2)
}
.hero::before{
  content:'';position:absolute;inset:0;
  background-image:radial-gradient(var(--hero-dot)1px,transparent 1px);
  background-size:28px 28px;pointer-events:none
}
.hero::after{
  content:'';position:absolute;top:-100px;right:-60px;
  width:500px;height:500px;
  background:radial-gradient(circle at 60% 40%,var(--c-acbg)0%,transparent 65%);
  pointer-events:none
}
.hero-glow2{
  position:absolute;bottom:-60px;left:-40px;
  width:350px;height:350px;
  background:radial-gradient(circle,rgba(99,102,241,.06)0%,transparent 60%);
  pointer-events:none
}
.hero-inner{position:relative;z-index:1;max-width:840px}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:7px;
  font-size:12px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;
  color:var(--c-ac);background:var(--c-acbg);border:1px solid var(--c-acbd);
  border-radius:100px;padding:5px 16px;margin-bottom:28px
}
.hero-eyebrow-dot{width:6px;height:6px;border-radius:50%;background:var(--c-acl);flex-shrink:0}
.hero h1{font-size:52px;font-weight:800;line-height:1.1;letter-spacing:-.04em;margin-bottom:20px}
.hero h1 em{font-style:normal;color:var(--c-ac)}
.hero h1 .dim{opacity:.35}

.hero-desc{font-size:16.5px;color:var(--hero-dim);line-height:1.75;max-width:580px;margin-bottom:36px}
.hero-search{
  display:flex;align-items:center;gap:10px;
  background:var(--hero-search-bg);border:1px solid var(--hero-search-bd);
  border-radius:10px;padding:13px 18px;max-width:520px;cursor:pointer;transition:all .2s
}
.hero-search:hover{background:var(--c-acbg);border-color:var(--c-acbd);box-shadow:0 0 0 4px rgba(14,165,233,.06)}
.hero-search .hs-icon{color:var(--hero-search-txt);flex-shrink:0;opacity:.6}
.hero-search .hs-text{flex:1;font-size:15px;color:var(--hero-search-txt)}
.hero-search kbd{font:11px/1 var(--font-mono);color:var(--hero-search-txt);background:var(--hero-search-kbd-bg);border:1px solid var(--hero-search-bd);padding:3px 8px;border-radius:5px}

.hero-stats{
  display:flex;gap:0;margin-top:48px;
  border-top:1px solid var(--hero-stat-bd);padding-top:36px
}
.hero-stat{flex:1;padding:0 36px;border-right:1px solid var(--hero-stat-bd)}
.hero-stat:first-child{padding-left:0}
.hero-stat:last-child{border-right:none;padding-right:0}
.hs-num{font-size:38px;font-weight:800;letter-spacing:-.03em;line-height:1;margin-bottom:6px}
.hs-num span{color:var(--c-ac)}
.hs-label{font-size:13px;color:var(--hero-dim)}

/* ═══ SEARCH OVERLAY ═══ */
.overlay{
  position:fixed;inset:0;z-index:900;
  background:var(--overlay-bg);backdrop-filter:blur(3px);display:none
}
.overlay.show{display:block}
.search-panel{
  position:absolute;top:68px;left:50%;transform:translateX(-50%);
  width:640px;max-width:94vw;
  background:var(--c-bg);border:1px solid var(--c-bd);
  border-radius:14px;overflow:hidden;box-shadow:var(--sh-lg)
}
.sp-input-wrap{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--c-bd2)}
.sp-input-wrap svg{color:var(--c-tm2);flex-shrink:0}
.sp-input-wrap input{flex:1;border:none;outline:none;font:15px/1 var(--font-sans);color:var(--c-t1);background:transparent}
.sp-input-wrap input::placeholder{color:var(--c-tm2)}
.sp-esc{font:11px/1 var(--font-mono);color:var(--c-tm);background:var(--c-bg3);border:1px solid var(--c-bd);padding:2px 7px;border-radius:4px;white-space:nowrap}
.sp-results{max-height:420px;overflow-y:auto;padding:4px 0}
.sp-empty{padding:36px;text-align:center;color:var(--c-tm2);font-size:14px}
.sp-item{display:flex;align-items:flex-start;gap:12px;padding:12px 20px;cursor:pointer;transition:background .1s}
.sp-item:hover{background:var(--c-bg2)}
.sp-item-body{flex:1;min-width:0}
.sp-item-cat{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:3px}
.sp-item-title{font-size:14px;font-weight:500;color:var(--c-t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sp-item-meta{font-size:12px;color:var(--c-tm2);margin-top:2px}
.sp-item-arrow{color:var(--c-tm2);flex-shrink:0;margin-top:2px}

/* ═══ LAYOUT ═══ */
.layout{display:flex;min-height:calc(100vh - var(--nav-h))}

/* ── Sidebar ── */
.sidebar{
  width:var(--sb-w);flex-shrink:0;background:var(--c-bg);
  border-right:1px solid var(--c-bd);
  position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));
  overflow-y:auto;padding:16px 0 24px
}
.sb-home{display:flex;align-items:center;gap:8px;padding:7px 16px;margin:0 8px 8px;border-radius:7px;font-size:13px;font-weight:600;color:var(--c-t3);cursor:pointer;transition:all .12s}
.sb-home:hover{background:var(--c-bg2);color:var(--c-t1)}
.sb-home.active{background:var(--c-acbg);color:var(--c-ac)}
.sb-sep{height:1px;background:var(--c-bd2);margin:6px 16px 10px}
.sb-group{margin-bottom:2px}
.sb-group-header{display:flex;align-items:center;gap:7px;padding:6px 16px;margin:0 8px;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:600;color:var(--c-t3);transition:all .12s;user-select:none}
.sb-group-header:hover{background:var(--c-bg2);color:var(--c-t1)}
.sb-group-header .arrow{font-size:9px;color:var(--c-tm2);transition:transform .18s;display:inline-block;flex-shrink:0}
.sb-group-header .arrow.open{transform:rotate(90deg)}
.sb-group-header .gb-name{flex:1}
.sb-group-header .gb-count{font-size:11px;font-family:var(--font-mono);color:var(--c-tm2);background:var(--c-bg3);padding:1px 6px;border-radius:10px}
.sb-items{padding:0 8px}
.sb-items.collapsed{display:none}
.sb-item{display:flex;align-items:center;gap:7px;padding:5px 10px 5px 24px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--c-t3);transition:all .1s}
.sb-item:hover{background:var(--c-bg2);color:var(--c-t1)}
.sb-item.active{background:var(--c-acbg);color:var(--c-ac);font-weight:600}
.sb-item .si-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.sb-item .si-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Content ── */
.content-area{flex:1;min-width:0;display:flex}
.content-main{flex:1;min-width:0}
.toc-rail{
  width:var(--toc-w);flex-shrink:0;
  position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));
  padding:32px 20px 32px 0;overflow-y:auto;display:none
}
.toc-rail.show{display:block}
.toc-heading{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--c-tm);margin-bottom:12px}
.toc-link{display:block;padding:4px 0 4px 12px;font-size:12.5px;color:var(--c-tm2);border-left:2px solid transparent;cursor:pointer;transition:all .1s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5}
.toc-link:hover{color:var(--c-t1);border-left-color:var(--c-tm2)}
.toc-link.active{color:var(--c-ac);border-left-color:var(--c-ac);font-weight:600}
.toc-link.lv3{padding-left:22px;font-size:12px}

/* ═══ HOME ═══ */
.home-body{padding:40px 48px 72px;max-width:min(1200px,calc(100vw - var(--sb-w) - 80px));margin:0 auto}
.section-title{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--c-tm);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--c-bd2)}

.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:14px;margin-bottom:16px}
.cat-card{background:var(--c-bg);border:1px solid var(--c-bd);border-radius:12px;padding:22px 24px;cursor:pointer;transition:all .2s;display:block}
.cat-card:hover{border-color:var(--c-acbd);box-shadow:var(--sh-md),0 1px 6px rgba(14,165,233,.06);transform:translateY(-2px)}
.cc-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.cc-icon{width:38px;height:38px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;background:var(--c-bg3)}
.cc-body{flex:1;min-width:0}
.cc-name{font-size:14px;font-weight:700;color:var(--c-t1);margin-bottom:2px}
.cc-count{font-size:12px;font-family:var(--font-mono);color:var(--c-tm);background:var(--c-bg3);padding:1px 7px;border-radius:10px;display:inline-block}
.cc-desc{font-size:12.5px;color:var(--c-tm);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cc-footer{margin-top:14px;padding-top:12px;border-top:1px solid var(--c-bd2);display:flex;align-items:center;gap:6px}
.cc-tag{font-size:11px;padding:2px 8px;border-radius:5px;font-weight:500}

/* ═══ CATEGORY PAGE ═══ */
.cat-page{padding:36px 48px 64px;max-width:min(1080px,calc(100vw - var(--sb-w) - 80px));margin:0 auto}
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--c-tm);margin-bottom:28px;flex-wrap:wrap}
.breadcrumb a{color:var(--c-ac);cursor:pointer;transition:opacity .1s}
.breadcrumb a:hover{opacity:.75}
.breadcrumb .sep{color:var(--c-tm2)}
.page-hero{margin-bottom:32px}
.page-hero h1{font-size:28px;font-weight:800;letter-spacing:-.025em;color:var(--c-t1);margin-bottom:6px}
.page-hero p{font-size:14px;color:var(--c-tm)}
.article-list-label{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--c-tm);padding:0 0 8px;margin-bottom:6px;border-bottom:1px solid var(--c-bd2)}
.article-row{display:flex;align-items:center;gap:14px;padding:10px 12px;border-radius:7px;cursor:pointer;transition:all .12s;font-size:14px;color:var(--c-t1);border:1px solid transparent;margin-bottom:2px}
.article-row:hover{background:var(--c-bg2);border-color:var(--c-bd)}
.ar-num{font:700 11.5px/1 var(--font-mono);color:var(--c-tm2);min-width:28px;text-align:right;flex-shrink:0}
.ar-title{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.ar-meta{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ar-arrow{color:var(--c-tm2);opacity:0;transition:opacity .12s}
.article-row:hover .ar-arrow{opacity:1}

/* ═══ ARTICLE ═══ */
.article-wrap{padding:36px 48px 64px;max-width:min(920px,calc(100vw - var(--sb-w) - var(--toc-w) - 140px));margin:0 auto}
.article-header{margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--c-bd)}
.ah-cat-badge{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.article-header h1{font-size:30px;font-weight:800;letter-spacing:-.025em;line-height:1.22;color:var(--c-t1);margin-bottom:14px}
.ah-meta{display:flex;align-items:center;gap:12px;font-size:12.5px;color:var(--c-tm);flex-wrap:wrap}
.ah-tag{font-size:11px;padding:3px 9px;border-radius:5px;font-weight:600}

.article-body{font-size:15px;line-height:1.82;color:var(--c-t3)}
.article-body h2{font-size:21px;font-weight:700;margin:40px 0 14px;padding-bottom:10px;border-bottom:1px solid var(--c-bd2);color:var(--c-t1);letter-spacing:-.02em}
.article-body h3{font-size:17px;font-weight:600;margin:30px 0 10px;color:var(--c-t1)}
.article-body h4{font-size:15px;font-weight:600;margin:24px 0 8px;color:var(--c-t2)}
.article-body p{margin:12px 0}
.article-body a{color:var(--c-ac);text-decoration:underline;text-underline-offset:2px}
.article-body a:hover{opacity:.8}
.article-body blockquote{border-left:3px solid var(--bq-bd);margin:16px 0;padding:10px 20px;background:var(--bq-bg);border-radius:0 8px 8px 0;color:var(--c-t2)}
.article-body blockquote p{margin:4px 0}
.article-body ul,.article-body ol{padding-left:24px;margin:12px 0}
.article-body li{margin:5px 0}
.article-body code{font:87%/1.4 var(--font-mono);background:var(--code-bg);color:var(--code-clr);padding:2px 7px;border-radius:5px;word-break:break-all}
.article-body pre{background:var(--pre-bg)!important;border-radius:10px;padding:20px 24px;overflow-x:auto;margin:18px 0;font:13.5px/1.7 var(--font-mono),monospace!important;color:var(--pre-clr)!important;border:1px solid var(--pre-bd);box-shadow:0 4px 20px rgba(0,0,0,.15);display:block!important;position:relative}
.article-body pre code{background:none!important;color:inherit!important;padding:0;font-size:inherit;border-radius:0;word-break:normal;display:block!important}
/* hljs harmony with our pre */
.article-body pre code.hljs{background:none!important;color:#c0caf5!important;padding:0!important}
/* Pre language label */
.article-body pre::before{content:attr(data-lang);position:absolute;top:8px;right:14px;font:11px/1 var(--font-mono);color:var(--c-tm2);text-transform:uppercase;letter-spacing:.04em;opacity:.5}
[data-theme=dark] .article-body pre::before{color:#565f89}
.article-body img{max-width:100%;border-radius:9px;margin:16px 0;border:1px solid var(--c-bd);display:block}
.img-broken{display:inline-flex;align-items:center;gap:8px;padding:12px 18px;background:var(--card-bg);border:1px dashed var(--c-bd);border-radius:8px;color:var(--text-sec);font-size:13px;margin:12px 0;max-width:100%}
.img-broken span:first-child{font-size:24px;flex-shrink:0}
.article-body mark{background:rgba(255,213,0,.35);color:inherit;padding:1px 3px;border-radius:3px;font-weight:inherit}
[data-theme=dark] .article-body mark{background:rgba(255,213,0,.28)}
.article-body table{border-collapse:collapse;width:100%;margin:18px 0;font-size:14px}
.article-body th,.article-body td{border:1px solid var(--c-bd);padding:10px 16px;text-align:left}
.article-body th{background:var(--c-bg2);font-weight:600;font-size:13px;color:var(--c-t1)}
.article-body tr:hover td{background:var(--c-bg2)}
.article-body hr{border:none;border-top:1px solid var(--c-bd);margin:32px 0}
.article-body strong{font-weight:700;color:var(--c-t1)}
.article-body del{opacity:.5}
.article-body .empty{color:var(--c-tm2);font-style:italic}

.loading-state{display:flex;align-items:center;gap:12px;padding:48px 0;color:var(--c-tm);font-size:14px}
.spin{width:18px;height:18px;border:2px solid var(--c-bd);border-top-color:var(--c-ac);border-radius:50%;animation:spin .6s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.error-card{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);border-radius:10px;padding:22px 24px;margin:24px 0}
.error-card h3{color:#ef4444;margin-bottom:8px;font-size:15px}
.error-card p{font-size:13.5px;color:var(--c-t3);margin:6px 0}
.error-card code{font:12px/1.5 var(--font-mono);background:rgba(239,68,68,.08);color:#ef4444;padding:2px 6px;border-radius:4px;word-break:break-all}
.back-link{color:var(--c-ac);cursor:pointer;font-size:13px;margin-top:14px;display:inline-flex;align-items:center;gap:5px}
.back-link:hover{text-decoration:underline}

/* ═══ RESPONSIVE ═══ */
@media(max-width:900px){
  .nav-menu-btn{display:flex;align-items:center;justify-content:center}
  .sidebar{position:fixed;left:calc(-1*var(--sb-w));top:var(--nav-h);z-index:400;width:var(--sb-w);height:calc(100vh - var(--nav-h));transition:left .24s;box-shadow:none}
  .sidebar.open{left:0;box-shadow:4px 0 24px rgba(15,23,42,.1)}
  .layout{display:block}
  .home-body,.cat-page,.article-wrap{padding:24px 18px 48px;max-width:100%!important}
  .toc-rail{display:none!important}
  .hero{padding:56px 24px 52px}
  .hero h1{font-size:34px}
  .hero-stats{flex-direction:column;gap:16px;padding-top:24px}
  .hero-stat{border-right:none!important;padding:0!important}
  .nav-search{width:40px;padding:6px 8px;justify-content:center}
  .nav-search .ns-text,.nav-search kbd{display:none}
  .tn-divider,.tn-breadcrumb{display:none}
  .cat-grid{grid-template-columns:1fr}
  .overlay .search-panel{width:100%;top:0;border-radius:0 0 14px 14px}
}
/* Tablet: sidebar visible, no TOC — give article more room */
@media(min-width:901px) and (max-width:1199px){
  .article-wrap{max-width:min(860px,calc(100vw - var(--sb-w) - 80px))}
  .home-body{max-width:min(1100px,calc(100vw - var(--sb-w) - 60px))}
  .cat-page{max-width:min(1000px,calc(100vw - var(--sb-w) - 60px))}
}
/* Desktop wide: extra breathing room for long content */
@media(min-width:1600px){
  .article-wrap{max-width:min(1100px,calc(100vw - var(--sb-w) - var(--toc-w) - 160px))}
  .home-body{max-width:min(1400px,calc(100vw - var(--sb-w) - 100px))}
}
@media(min-width:1200px){.toc-rail.show{display:block}}
@media print{
  .topnav,.sidebar,.toc-rail,.hero{display:none!important}
  .article-wrap{padding:0;max-width:100%!important}
}

/* ─── Image Viewer ─── */
.img-viewer-wrap{display:flex;flex-direction:column;align-items:center;min-height:200px;position:relative}
.img-viewer-wrap.loaded{min-height:auto}
.img-viewer{max-width:100%;height:auto;border-radius:8px;box-shadow:0 2px 12px rgba(0,0,0,.12);cursor:zoom-in;transition:transform .2s}
.img-viewer:hover{transform:scale(1.01)}
.img-viewer-error{width:100%;padding:32px;text-align:center;background:var(--card-bg);border-radius:8px;border:1px solid var(--border)}
.img-dl-bar{display:flex;justify-content:center;margin-top:16px;padding-bottom:8px}
.img-dl-btn{display:inline-flex;align-items:center;gap:4px;padding:8px 20px;border-radius:8px;background:var(--accent);color:#fff !important;font-size:14px;font-weight:500;text-decoration:none !important;transition:opacity .2s}
.img-dl-btn:hover{opacity:.85}

/* ─── Download Card ─── */
.dl-card{display:flex;align-items:center;gap:16px;padding:24px;background:var(--card-bg);border-radius:12px;border:1px solid var(--border);box-shadow:0 1px 3px rgba(0,0,0,.04)}
.dl-card-icon{font-size:40px;flex-shrink:0;line-height:1}
.dl-card-info{flex:1;min-width:0}
.dl-card-name{font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px;word-break:break-all}
.dl-card-desc{font-size:13px;color:var(--text-sec);line-height:1.5}
.dl-card-btn{display:inline-flex;align-items:center;gap:4px;padding:10px 24px;border-radius:8px;background:var(--accent);color:#fff !important;font-size:14px;font-weight:500;text-decoration:none !important;white-space:nowrap;transition:opacity .2s;flex-shrink:0}
.dl-card-btn:hover{opacity:.85}

/* ─── Article card type indicator ─── */
.art-type-badge{display:inline-block;font-size:11px;padding:1px 6px;border-radius:4px;margin-left:4px;vertical-align:middle}
.art-type-badge.img{background:#3b82f618;color:#3b82f6}
.art-type-badge.dl{background:#f59e0b18;color:#f59e0b}

/* ─── Embed Viewer (drawio / pptx iframe) ─── */
.embed-viewer-wrap{width:100%;margin-bottom:16px}
.embed-viewer{width:100%;height:600px;border-radius:10px;border:1px solid var(--border);background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.06)}

/* ─── Download Bar (replaces dl-card for embed pages) ─── */
.dl-bar{display:flex;justify-content:center;padding:12px 0}
.dl-link{display:inline-flex;align-items:center;gap:4px;padding:8px 20px;border-radius:8px;background:var(--accent);color:#fff !important;font-size:13px;font-weight:500;text-decoration:none !important;transition:opacity .2s}
.dl-link:hover{opacity:.85}

/* ─── XMind Tree Renderer ─── */
.xmind-render-wrap{min-height:200px}
.xmind-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;color:var(--text-sec);gap:12px}
.xmind-sheets{display:flex;flex-direction:column;gap:20px}
.xmind-sheet{background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:16px 20px;overflow-x:auto}
.xmind-sheet-title{font-size:15px;font-weight:600;color:var(--text-sec);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.xmind-node{position:relative;padding-left:20px}
.xmind-node:before{content:'';position:absolute;left:6px;top:0;bottom:0;width:1px;background:var(--border)}
.xmind-node:last-child:before{bottom:50%}
.xmind-node-content{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;transition:background .15s;cursor:default;position:relative}
.xmind-node-content:before{content:'';position:absolute;left:-14px;top:50%;width:14px;height:1px;background:var(--border)}
.xmind-node-content:hover{background:var(--c-bg3)}
.xmind-node-toggle{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;font-size:10px;color:var(--text-sec);cursor:pointer;user-select:none;flex-shrink:0;transition:transform .2s}
.xmind-node.collapsed>.xmind-node-content>.xmind-node-toggle{transform:rotate(-90deg)}
.xmind-node.collapsed>.xmind-children{display:none}
.xmind-node-leaf{display:inline-flex;width:16px;justify-content:center;color:var(--text-sec);flex-shrink:0;font-size:14px}
.xmind-node-title{font-size:14px;color:var(--text);line-height:1.5}
.xmind-children{margin-top:2px}
.xmind-root>.xmind-node-content{background:var(--accent)15;border-radius:8px;padding:8px 12px;margin-bottom:4px}
.xmind-root>.xmind-node-content:before{display:none}
.xmind-root>.xmind-node-content .xmind-node-title{font-weight:700;font-size:15px;color:var(--accent)}
.xmind-error{padding:32px;text-align:center;background:var(--card-bg);border-radius:8px;border:1px solid var(--border)}
.xmind-error h3{color:#ef4444;margin-bottom:8px}
.xmind-error p{color:var(--text-sec);font-size:13px;margin:4px 0}

/* ─── Mermaid Diagrams ─── */
.mermaid-wrap{margin:24px 0;padding:16px;background:var(--card-bg);border-radius:10px;border:1px solid var(--border);overflow-x:auto}
.mermaid-wrap .mermaid{display:flex;justify-content:center}
.mermaid-wrap .mermaid svg{max-width:100%;height:auto}
.mermaid-fallback{margin:24px 0;padding:16px;background:var(--code-bg);border-radius:8px;overflow-x:auto;font-size:13px;line-height:1.6}
.mermaid-fallback code{background:transparent;padding:0}
[data-theme=dark] .mermaid-wrap{background:var(--c-bg2)}
[data-theme=dark] .mermaid-wrap .mermaid svg .edgeLabel rect,
[data-theme=dark] .mermaid-wrap .mermaid svg .labelBkg{fill:#1e293b!important}

<script>
// ════════════════════════════════════════════════
//  THEME SYSTEM  (auto → light → dark cycle)

// ════════════════════════════════════════════════
(function initTheme(){
  const saved = localStorage.getItem('sn-theme') || 'auto';
  applyTheme(saved);

  // Listen for system preference changes (only when "auto")
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change',function(){
    if(localStorage.getItem('sn-theme')==='auto') applyTheme('auto');
  });
})();

function applyTheme(mode){
  const html = document.documentElement;
  if(mode==='auto'){
    const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    html.setAttribute('data-theme', sysDark ? 'dark' : 'light');
  } else {
    html.setAttribute('data-theme', mode);
  }
  localStorage.setItem('sn-theme', mode);
  updateThemeIcon(mode);
  // Re-init mermaid for current theme and re-render if mermaid diagrams exist
  if(typeof mermaid!=='undefined'){
    initMermaid();
    const existingMermaid=document.querySelectorAll('.mermaid-wrap .mermaid');
    if(existingMermaid.length){
      // Reset already-rendered SVGs so mermaid.run re-renders them
      existingMermaid.forEach(el=>{el.removeAttribute('data-processed');});
      mermaid.run({querySelector:'.mermaid-wrap .mermaid'}).catch(()=>{});
    }
  }
}

function cycleTheme(){
  const map = {auto:'light', light:'dark', dark:'auto'};
  const cur = localStorage.getItem('sn-theme')||'auto';
  applyTheme(map[cur]||'auto');
}

function updateThemeIcon(mode){
  const sun = document.getElementById('themeIconSun');
  const moon = document.getElementById('themeIconMoon');
  const btn = document.getElementById('themeBtn');
  if(!sun||!moon||!btn) return;
  if(mode==='dark'){
    sun.style.display='none'; moon.style.display='block';
    btn.title='浅色模式';
  } else if(mode==='light'){
    sun.style.display='block'; moon.style.display='none';
    btn.title='夜间模式';
  } else {
    // auto
    const sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    sun.style.display=sysDark?'none':'block';
    moon.style.display=sysDark?'block':'none';
    btn.title='自动 · 点击切换';
  }
}

function getThemeMode(){ return localStorage.getItem('sn-theme')||'auto'; }

// ════════════════════════════════════════════════
//  MERMAID DIAGRAM RENDERER
// ════════════════════════════════════════════════
function initMermaid(){
  if(typeof mermaid==='undefined') return;
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')==='dark';
  mermaid.initialize({
    startOnLoad:false,
    theme:'base',
    themeVariables:{
      primaryColor: isDark?'#334155':'#e2e8f0',
      primaryTextColor: isDark?'#e2e8f0':'#1e293b',
      primaryBorderColor: isDark?'#475569':'#94a3b8',
      lineColor: isDark?'#64748b':'#64748b',
      secondaryColor: isDark?'#1e293b':'#f1f5f9',
      tertiaryColor: isDark?'#0f172a':'#f8fafc',
      fontSize:'14px'
    }
  });
}
initMermaid();

async function renderMermaid(){
  if(typeof mermaid==='undefined') return;
  const root=document.getElementById('pageRoot');
  if(!root) return;
  // Find mermaid code blocks that marked.js rendered as <code class="language-mermaid">
  const mermaidBlocks=root.querySelectorAll('code.language-mermaid');
  if(!mermaidBlocks.length) return;
  for(const block of mermaidBlocks){
    const pre=block.parentElement;
    const src=block.textContent;
    // Create a mermaid container
    const container=document.createElement('div');
    container.className='mermaid-wrap';
    container.innerHTML=`<div class="mermaid">${hEsc(src)}</div>`;
    pre.replaceWith(container);
  }
  try {
    // Re-init to pick up current theme
    initMermaid();
    await mermaid.run({querySelector:'.mermaid'});
  } catch(e){
    console.warn('mermaid render error:', e);
    // Fallback: show raw code in a pre block
    document.querySelectorAll('.mermaid-wrap .mermaid').forEach(el=>{
      if(el.querySelector('svg')) return; // already rendered
      const src=el.textContent;
      el.outerHTML=`<pre class="mermaid-fallback"><code>${hEsc(src)}</code></pre>`;
    });
  }
}

// ════════════════════════════════════════════════
//  CATEGORY DEFINITIONS
// ════════════════════════════════════════════════
const CAT_DEF = {
  android:      {n:'Android 开发',     emoji:'🤖', color:'#10b981', desc:'JNI、WebView、Gradle、动画、混淆、VPN、键值对存储等基础开发'},
  'android-adv':{n:'Android 进阶',     emoji:'⚡', color:'#059669', desc:'架构模式、组件化总结、Service/AIDL、插件化、App启动优化'},

// ════════════════════════════════════════════════
//  MARKDOWN PARSER — powered by marked.js
// ════════════════════════════════════════════════
function parseMD(src){
  if(!src||!src.trim()) return '<p class="empty">（本文档暂无内容）</p>';
  try {
    // Pre-process 1: ==highlight== → <mark>
    src = src.replace(/==(.+?)==/g, '<mark>$1</mark>');
    // Pre-process 2: Fix bold/italic boundary before CJK punctuation
    // marked.js v15 doesn't treat CJK punctuation as word-boundary, so
    // "**text**。" is not parsed as bold. Insert zero-width space as workaround.
    // Matches: **...** or *...* immediately followed by CJK full-width punct
    const cjkPunct = '\u3000-\u303f\uff00-\uffef\u2018-\u201f\u2e80-\u2eff\u3400-\u4dbf\u4e00-\u9fff\u{20000}-\u{2a6df}';
    src = src.replace(/(\*{1,2}[^*\n]+?\*{1,2})([\u3000-\u303f\uff00-\uffef\u2018-\u201f，。、；：！？「」【】《》（）…—～·])/g, '$1\u200b$2');
    // Pre-process 3: Also fix opening bold/italic after CJK punct
    src = src.replace(/([\u3000-\u303f\uff00-\uffef\u2018-\u201f，。、；：！？「」【】《》（）…—～·])(\*{1,2}[^*\s])/g, '$1\u200b$2');
    const html = marked.parse(src, { gfm: true, breaks: false, async: false });
    // Post-process: Add onerror handler to all <img> tags for broken external images
    return html.replace(/<img(\s[^>]*?)>/g, (match, attrs) => {
      if (attrs.includes('onerror')) return match;
      // Extract src for alt display
      const srcMatch = attrs.match(/src="([^"]+)"/);
      const altMatch = attrs.match(/alt="([^"]*)"/);
      const alt = altMatch ? altMatch[1] : '图片';
      return `<img${attrs} onerror="this.onerror=null;this.parentNode.replaceChild((function(){const d=document.createElement('div');d.className='img-broken';d.innerHTML='<span>🖼️</span><span>${alt || '图片加载失败'}</span>';return d})(),this)">`;
    });
  } catch(e) {
    console.error('[parseMD] marked error:', e);
    return '<p class="error">Markdown 解析错误: '+e.message+'</p>';
  }
}

// ════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════
function hEsc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function slugify(s){return s.toLowerCase().replace(/[^\w\u4e00-\u9fff]+/g,'-').replace(/^-|-$/g,'')||'h'}
function hlMatch(t,q){
  if(!q)return t;
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return t.replace(re,'<mark style="background:rgba(251,191,36,.3);padding:0 2px;border-radius:2px">$1</mark>');
}

function route(){
  const h=location.hash.slice(1)||'/';
  if(!h||h==='/')renderHome();
  else if(h.startsWith('article/')){
    const parts=h.split('/');
    const n=parseInt(parts[1]);
    const anchor=parts[2]?decodeURIComponent(parts[2]):null; // decode %E8%A7%A3 → 解
    if(n>=0&&n<ART.length) loadArticle(n,anchor);
    else renderHome();
  }
  else if(h.startsWith('cat/'))renderCat(h.slice(4));
  else renderHome();
}

          <span>${md.split('\\n').length} 行原文</span>
        </div>
      </div>
      <div class="article-body">${finalBodyHtml}</div>
    </div>`;

    // Scroll to top immediately (before hljs/mermaid inflate the DOM)
    window.scrollTo(0,0);

    // Apply syntax highlighting
    try{if(typeof hljs!=='undefined'){hljs.highlightAll();}}catch(e){console.warn('hljs:',e);}

    // Render Mermaid diagrams
    try{renderMermaid();}catch(e){console.warn('mermaid:',e);}

    // Scroll to anchor AFTER hljs + mermaid have finished inflating the DOM,
    // otherwise getBoundingClientRect() returns pre-render offsets and the
    // scroll lands at the wrong position (or not at all on GitHub Pages).
    if(anchor){
      // Use setTimeout so the browser has completed layout after hljs/mermaid
      setTimeout(()=>{
        const target=document.getElementById(anchor);
        if(target){
          const navH=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--nav-h'))||56;
          const top=target.getBoundingClientRect().top+window.pageYOffset-navH-16;
          window.scrollTo({top,behavior:'smooth'});
        }
      }, 120);
    }

    if(tocItems.length>2){
      const tocRailEl=document.getElementById('tocRail');
      const scrollSpy=()=>{
        let cur=null;
        const hs=root.querySelectorAll('.article-body h1[id],.article-body h2[id],.article-body h3[id],.article-body h4[id]');
        hs.forEach(h=>{if(h.getBoundingClientRect().top<=130)cur=h.id;});
        tocRailEl.querySelectorAll('.toc-link').forEach(el=>{
          el.classList.toggle('active',el.getAttribute('data-target')===cur);
        });
        // Keep URL in sync with scroll position for sharable anchor links
        if(curIdx>=0){
          const newHash='#article/'+curIdx+(cur?'/'+encodeURIComponent(cur):'');
          if(location.hash!==newHash) history.replaceState(null,'',location.pathname+newHash);
        }
      };
      window.removeEventListener('scroll',window.__tocScroll);
      window.__tocScroll=scrollSpy;
      window.addEventListener('scroll',scrollSpy,{passive:true});
      // TOC click — scroll to heading & update URL anchor
      tocRailEl.onclick=e=>{
        const link=e.target.closest('.toc-link');
        if(!link)return;
        e.preventDefault();
        const targetId=link.getAttribute('data-target');
        const el=document.getElementById(targetId);
        if(el){
          const navH=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--nav-h'))||56;
          const top=el.getBoundingClientRect().top+window.pageYOffset-navH-16;
          window.scrollTo({top,behavior:'smooth'});
          // Update URL: #article/idx/heading-id (encoded for Chinese chars)
          if(curIdx>=0){
            history.replaceState(null,'',location.pathname+'#article/'+curIdx+'/'+encodeURIComponent(targetId));
          }
        }
        tocRailEl.querySelectorAll('.toc-link').forEach(l=>l.classList.remove('active'));
        link.classList.add('active');
      };
    }
  }catch(err){
    document.getElementById('tocRail').classList.remove('show');
    root.innerHTML=`<div class="article-wrap">
      <div class="breadcrumb"><a onclick="goHome()">首页</a><span class="sep">/</span><a onclick="nav('cat/${a.c}')">${cat.emoji} ${cat.n}</a></div>
      <div class="article-header"><div class="ah-cat-badge" style="color:${cat.color}">${cat.emoji} ${cat.n}</div><h1>${hEsc(a.t)}</h1></div>
      <div class="error-card">
        <h3>⚠️ 无法加载文章</h3><p>${hEsc(err.message)}</p><p>文件路径：<code>${hEsc(a.p)}</code></p>
        <p style="font-size:13px;margin-top:8px">请确认 .md 文件已推送到 GitHub 仓库，且路径编码一致。</p>
        <a class="back-link" onclick="goHome()"><svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M10 6.5H2M5 3 1.5 6.5 5 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>返回首页</a>
      </div>
    </div>`;
  }
}

// ════════════════════════════════════════════════
//  XMIND RENDERER — parse .xmind (ZIP) and render tree
// ════════════════════════════════════════════════
async function renderXMind(fileUrl){
  const container=document.getElementById('xmindRender');
  if(!container)return;
  try{
    const resp=await fetch(fileUrl);
    if(!resp.ok)throw new Error('HTTP '+resp.status);
    const buf=await resp.arrayBuffer();
    const zip=await JSZip.loadAsync(buf);

    // Try content.json (XMind 8+/Zen) first, then content.xml (legacy)
    let jsonStr=null;
    if(zip.file('content.json')){
      jsonStr=await zip.file('content.json').async('string');
    }else if(zip.file('content.xml')){
      // Legacy XML format — not parsing, fallback
      throw new Error('legacy XML format');
    }else{
      throw new Error('no content found');
    }

    const data=JSON.parse(jsonStr);
    // content.json is an array of sheets; each sheet has rootTopic
    const sheets=Array.isArray(data)?data:[data];
    let html='<div class="xmind-sheets">';
    sheets.forEach((sheet,si)=>{
      const root=sheet.rootTopic;
      if(!root)return;
      const sheetTitle=sheet.title||('Sheet '+(si+1));
      html+=`<div class="xmind-sheet" style="--sheet-idx:${si}">`;
      html+=`<div class="xmind-sheet-title">${hEsc(sheetTitle)}</div>`;
      html+=renderXMindNode(root,0);
      html+='</div>';
    });
    html+='</div>';
    container.innerHTML=html;

    // Add toggle listeners
    container.querySelectorAll('.xmind-node-toggle').forEach(btn=>{
      btn.onclick=()=>{
        const node=btn.closest('.xmind-node');
        node.classList.toggle('collapsed');
      };
    });
  }catch(err){
    console.warn('[XMind] parse failed:',err);
    container.innerHTML=`<div class="xmind-error">
      <h3>⚠️ XMind 在线渲染失败</h3>
      <p>原因：${hEsc(err.message)}</p>
      <p>请使用上方下载按钮获取源文件，在 XMind 软件中打开。</p>
    </div>`;
  }
}

function renderXMindNode(topic,depth){
  if(!topic)return '';
  const title=topic.title||'(无标题)';
  const children=[];
  // XMind stores children in children.attached array
  const attached=topic.children?.attached||[];
  // Also check for detached (floating topics)
  const detached=topic.children?.detached||[];
  const allKids=[...attached,...detached];

  const hasChildren=allKids.length>0;
  const isRoot=depth===0;

  let html=`<div class="xmind-node${isRoot?' xmind-root':''}">`;
  html+=`<div class="xmind-node-content">`;
  if(hasChildren){
    html+=`<span class="xmind-node-toggle">▼</span>`;
  }else{
    html+=`<span class="xmind-node-leaf">•</span>`;
  }
  html+=`<span class="xmind-node-title">${hEsc(title)}</span>`;
  html+=`</div>`;

  if(hasChildren){
    html+='<div class="xmind-children">';
    allKids.forEach(child=>{
      html+=renderXMindNode(child,depth+1);
    });
    html+='</div>';
  }

  html+='</div>';
  return html;
}

//  SEARCH
// ════════════════════════════════════════════════
function openSearch(){document.getElementById('overlay').classList.add('show');setTimeout(()=>document.getElementById('searchInput')?.focus(),60);}
function closeSearch(){document.getElementById('overlay').classList.remove('show');const inp=document.getElementById('searchInput');if(inp)inp.value='';document.getElementById('searchResults').innerHTML='<div class="sp-empty">输入关键词开始搜索…</div>';}
function handleOverlayClick(e){if(e.target===document.getElementById('overlay'))closeSearch();}

function doSearch(q){
  const box=document.getElementById('searchResults');
  if(!q||!q.trim()){box.innerHTML='<div class="sp-empty">输入关键词开始搜索…</div>';return;}
  const kw=q.trim().toLowerCase();
  const hits=ART.map((a,i)=>({...a,_i:i})).filter(a=>a.t.toLowerCase().includes(kw)||(CAT_DEF[a.c]?.n||'').toLowerCase().includes(kw)||(CAT_DEF[a.c]?.desc||'').toLowerCase().includes(kw)).slice(0,12);
  if(!hits.length){box.innerHTML='<div class="sp-empty">未找到匹配文章</div>';return;}
  box.innerHTML=hits.map(a=>{
    const c=CAT_DEF[a.c]||{n:'其他',emoji:'📋',color:'#64748b'};
    return`<div class="sp-item" onclick="nav('article/${a._i}');closeSearch()">
      <div class="sp-item-body"><div class="sp-item-cat" style="color:${c.color}">${c.emoji} ${c.n}</div><div class="sp-item-title">${hlMatch(hEsc(a.t),kw)}${a.type==='img'?' 🖼️':a.type==='dl'?' 📦':''}</div><div class="sp-item-meta">${c.n}</div></div>
      <svg class="sp-item-arrow" width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2.5 6.5h8M7 3l3.5 3.5L7 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>`;
  }).join('');
}
